<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Cat Test</title>
    <style>
        body { margin: 0; padding: 20px; background: #000; color: #fff; font-family: Arial; }
        canvas { border: 2px solid #4ecdc4; }
        .error { color: #ff0000; }
        .success { color: #00ff00; }
    </style>
</head>
<body>
    <h1>🐱 Space Cat Test</h1>
    <div id="status">Loading...</div>
    <canvas id="gameCanvas" width="400" height="300"></canvas>
    <div id="console"></div>

    <script>
        const status = document.getElementById('status');
        const console = document.getElementById('console');
        
        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            console.appendChild(div);
        }

        try {
            log('Starting Space Cat test...', 'success');
            
            // Test basic canvas
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#4ecdc4';
            ctx.fillRect(50, 50, 100, 50);
            ctx.fillStyle = '#ffffff';
            ctx.font = '16px Arial';
            ctx.fillText('Space Cat', 60, 80);
            
            log('Canvas test passed', 'success');
            
            // Test if classes are available
            if (typeof AssetManager !== 'undefined') {
                log('AssetManager class found', 'success');
            } else {
                log('AssetManager class not found', 'error');
            }
            
            if (typeof SpaceCatShip !== 'undefined') {
                log('SpaceCatShip class found', 'success');
            } else {
                log('SpaceCatShip class not found', 'error');
            }
            
            status.textContent = 'Test completed - check console for results';
            
        } catch (error) {
            log(`Error: ${error.message}`, 'error');
            status.textContent = 'Test failed - see console for details';
        }
    </script>

    <!-- Load game scripts -->
    <script src="js/gameConfig.js"></script>
    <script src="js/assets.js"></script>
    <script src="js/physics.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/commands.js"></script>
    <script src="js/gameObjects.js"></script>
    <script src="js/spacecraft.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
