<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Cat - Loading Test</title>
    <style>
        body { margin: 0; padding: 20px; background: #000; color: #fff; font-family: Arial; }
        .test-container { max-width: 800px; margin: 0 auto; }
        .test-item { margin: 10px 0; padding: 10px; background: #333; border-radius: 5px; }
        .success { color: #00ff00; }
        .error { color: #ff0000; }
        .warning { color: #ffff00; }
        .info { color: #4ecdc4; }
        canvas { border: 2px solid #4ecdc4; background: #000; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🐱 Space Cat - Loading Test</h1>
        <div id="test-results"></div>
        <canvas id="gameCanvas" width="400" height="300"></canvas>
        <div>
            <button onclick="runTests()">Run Tests</button>
            <button onclick="clearResults()">Clear</button>
        </div>
    </div>

    <script>
        const results = document.getElementById('test-results');
        
        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `test-item ${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            results.appendChild(div);
            results.scrollTop = results.scrollHeight;
        }

        function clearResults() {
            results.innerHTML = '';
        }

        function runTests() {
            clearResults();
            addResult('Starting Space Cat loading tests...', 'info');
            
            // Test 1: Check if canvas works
            try {
                const canvas = document.getElementById('gameCanvas');
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#4ecdc4';
                ctx.fillRect(50, 50, 100, 50);
                ctx.fillStyle = '#ffffff';
                ctx.font = '16px Arial';
                ctx.fillText('Space Cat Test', 60, 80);
                addResult('✅ Canvas test passed', 'success');
            } catch (error) {
                addResult(`❌ Canvas test failed: ${error.message}`, 'error');
            }
            
            // Test 2: Check script loading
            setTimeout(() => {
                const scripts = [
                    'GAME_CONFIG', 'AssetManager', 'PhysicsEngine', 'UIManager',
                    'CommandManager', 'Asteroid', 'EnergyPickup', 'Explosion',
                    'EscapePod', 'SpaceCatShip', 'SpaceCatGame'
                ];
                
                scripts.forEach(script => {
                    if (typeof window[script] !== 'undefined') {
                        addResult(`✅ ${script} loaded`, 'success');
                    } else {
                        addResult(`❌ ${script} missing`, 'error');
                    }
                });
                
                // Test 3: Try to create game
                try {
                    addResult('🎮 Attempting to create game...', 'info');
                    const game = new SpaceCatGame();
                    addResult('✅ Game created successfully', 'success');
                    
                    // Test spacecraft
                    if (game.spacecraft) {
                        addResult('✅ Spacecraft initialized', 'success');
                    } else {
                        addResult('❌ Spacecraft not initialized', 'error');
                    }
                    
                    // Test UI
                    if (game.ui) {
                        addResult('✅ UI Manager initialized', 'success');
                    } else {
                        addResult('❌ UI Manager not initialized', 'error');
                    }
                    
                } catch (error) {
                    addResult(`❌ Game creation failed: ${error.message}`, 'error');
                    addResult(`Stack: ${error.stack}`, 'error');
                }
                
            }, 1000); // Wait 1 second for scripts to load
        }

        // Auto-run tests when page loads
        window.addEventListener('load', () => {
            addResult('Page loaded, running automatic tests...', 'info');
            setTimeout(runTests, 500);
        });
    </script>

    <!-- Load all game scripts -->
    <script src="js/gameConfig.js"></script>
    <script src="js/assets.js"></script>
    <script src="js/physics.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/commands.js"></script>
    <script src="js/gameObjects.js"></script>
    <script src="js/spacecraft.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
